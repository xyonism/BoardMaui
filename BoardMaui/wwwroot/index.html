<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	<title>MauiBoard</title>
	<base href="/" />
	<link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
	<link rel="stylesheet" href="css/app.css" />
	<link rel="stylesheet" href="BoardMaui.styles.css" />
	<script src="https://unpkg.com/html5-qrcode"></script>
	<link rel="icon" type="image/png" href="favicon.png" />
	<style>
		.fade-in
		{
			opacity: 1;
			transition: opacity 1.1s ease-in-out;
		}

		.fade-out
		{
			opacity: 0;
			transition: opacity 1.1s ease-in-out;
		}
	</style>

	<script>
		window.startQrScanner = function (dotnetHelper) {
			const html5QrCode = new Html5Qrcode("reader");
			const config = {fps: 10, qrbox: 250};

			html5QrCode.start(
				{facingMode: "environment"},
				config,
				qrCodeMessage => {
					dotnetHelper.invokeMethodAsync("SetScanResult", qrCodeMessage);
					html5QrCode.stop();
				},
				errorMessage => {
					// Optional: console.log(errorMessage);
				}
			);
		}


		function checkTime() {
			if (new Date().getSeconds() % 20 === 0) {
				const elementsToAnimate = document.querySelectorAll("footer, main, header");
				setTimeout(() => {
					elementsToAnimate.forEach(element => {
						if (!window.location.href.includes("edit"));
						{
							element.classList.remove("fade-out");
							element.classList.add("fade-in");
						}
					});
				}, 1000);

				setTimeout(() => {
					elementsToAnimate.forEach(element => {
						if (!window.location.href.includes("edit"));
						{
							element.classList.remove("fade-in");
							element.classList.add("fade-out");
						}
					});
				}, 19000);
			}
		}
		setInterval(checkTime, 100);
	</script>
</head>

<body>
	<div class="status-bar-safe-area"></div>

	<div id="app">Loading...</div>

	<div id="blazor-error-ui">
		An unhandled error has occurred.
		<a href="" class="reload">Reload</a>
		<a class="dismiss">🗙</a>
	</div>

	<script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
